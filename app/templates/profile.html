{% extends 'base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto; background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
    <h2>Agent Profile</h2>
    <hr>
    <p><strong>Username:</strong> {{ current_user.username }}</p>
    <p><strong>Email:</strong> {{ current_user.email }}</p>
    <p><strong>Current Balance:</strong> 
        <span style="font-size: 1.2rem; color: #28a745; font-weight: bold;">
            ${{ "%.2f"|format(current_user.balance) }}
        </span>
    </p>
    <div style="margin-top: 2rem;">
        <a href="/orders" style="background-color: #007bff; color: white; padding: 10px 15px; text-decoration: none; border-radius: 4px;">View Order History</a>
    </div>
</div>
{% endblock %}
